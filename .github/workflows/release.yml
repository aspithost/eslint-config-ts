name: Release

on:
  push:
    branches: [main]

jobs:
  build:
    uses: aspithost/actions/.github/workflows/build-node.yml@v1
    with:
      upload-artifact: true

  release:
    needs: build
    uses: aspithost/actions/.github/workflows/release-npm.yml@v1
    permissions:
      contents: write
      id-token: write
