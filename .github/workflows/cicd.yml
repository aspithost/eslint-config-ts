name: CICD

on:
  push:
    branches: [main]

jobs:
  cicd:
    uses: aspithost/actions/.github/workflows/node-cicd.yml@v2
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    with:
      run-sonar: true
    secrets:
      sonar-token: ${{ secrets.SONAR_TOKEN }}
